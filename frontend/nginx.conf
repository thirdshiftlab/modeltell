server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Hashed build assets — cache hard (filenames change on rebuild).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Dataset JSON — short cache so a fresh run shows up without a hard reload.
  location /data/ {
    add_header Cache-Control "public, max-age=300";
  }

  # SPA-safe: hash routing means everything resolves to index.html anyway.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
