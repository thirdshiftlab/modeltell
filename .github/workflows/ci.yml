name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pipeline:
    name: Type-check & build (pipeline + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Type-check (root)
        run: npm run typecheck
      - name: Build CLI
        run: npm run build:cli

  frontend:
    name: Type-check & build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      # `npm run build` syncs published/ → public/data, then tsc --noEmit + vite build.
      - run: npm run build
